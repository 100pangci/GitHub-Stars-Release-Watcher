<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GitHub Stars Release Watcher{% endblock %}</title>
    <link rel="stylesheet" href="/static/app.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">GitHub Stars Release Watcher</a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
                <a href="/repos" class="nav-link {% if request.url.path == '/repos' %}active{% endif %}">Repositories</a>
                <a href="/events" class="nav-link {% if request.url.path == '/events' %}active{% endif %}">Events</a>
                <a href="/settings" class="nav-link {% if request.url.path == '/settings' %}active{% endif %}">Settings</a>
                <a href="/logs" class="nav-link {% if request.url.path == '/logs' %}active{% endif %}">Logs</a>
                <a href="/logout" class="nav-link" style="color: var(--danger-color);">Logout</a>
            </div>
        </div>
    </nav>

    <main class="main-container">
        {% if flash %}
        <div class="flash-message flash-{{ flash.type }}" id="flash-message">
            {{ flash.message }}
            <button class="flash-close" onclick="document.getElementById('flash-message').remove()">&times;</button>
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-content">
            <span>GitHub Stars Release Watcher v1.0.0</span>
        </div>
    </footer>

    <script>
        // Auto-hide flash messages after 10 seconds
        document.addEventListener('DOMContentLoaded', function() {
            const flash = document.getElementById('flash-message');
            if (flash) {
                setTimeout(function() {
                    flash.style.opacity = '0';
                    setTimeout(function() { flash.remove(); }, 500);
                }, 10000);
            }
        });
    </script>
</body>
</html>
